appId: com.freshenapp.freshen
---
# Sort records: add multiple records -> change sort order -> verify reordering
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Add first record: "Clover"
- tapOn: "+"
- waitForAnimationToEnd
- tapOn: "e.g. Daisy"
- inputText: "Clover"
- hideKeyboard
- scrollUntilVisible:
    element: "Save"
    direction: DOWN
- tapOn: "Save"
- waitForAnimationToEnd

# Add second record: "Daisy"
- tapOn: "+"
- waitForAnimationToEnd
- tapOn: "e.g. Daisy"
- inputText: "Daisy"
- hideKeyboard
- scrollUntilVisible:
    element: "Save"
    direction: DOWN
- tapOn: "Save"
- waitForAnimationToEnd

# Add third record: "Amber"
- tapOn: "+"
- waitForAnimationToEnd
- tapOn: "e.g. Daisy"
- inputText: "Amber"
- hideKeyboard
- scrollUntilVisible:
    element: "Save"
    direction: DOWN
- tapOn: "Save"
- waitForAnimationToEnd

# Verify all three records are visible
- assertVisible: "Clover"
- assertVisible: "Daisy"
- assertVisible: "Amber"

# Tap the Sort button to open the sort sheet
- tapOn: "Sort"
- waitForAnimationToEnd

# Select "Animal name (A-Z)" sort option
- tapOn: "Animal name (A–Z)"
- waitForAnimationToEnd

# Verify all records are still visible (order is visual, just confirm they exist)
- assertVisible: "Amber"
- assertVisible: "Clover"
- assertVisible: "Daisy"
