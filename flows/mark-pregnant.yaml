appId: com.freshenapp.freshen
---
# Mark pregnant: add a record -> long press -> mark pregnant -> verify badge changes
- launchApp:
    clearState: true
- waitForAnimationToEnd

# First, add a breeding record
- tapOn: "+"
- waitForAnimationToEnd
- tapOn: "e.g. Daisy"
- inputText: "Buttercup"
- tapOn: "e.g. Buck (optional)"
- inputText: "Rocky"
- swipe:
    start: 50%, 40%
    end: 50%, 15%
- scrollUntilVisible:
    element: "Save"
    direction: DOWN
- tapOn: "Save"
- waitForAnimationToEnd

# Wait for the settled home screen — the count header exists only there
- extendedWaitUntil:
    visible: "1 active breeding."
    timeout: 10000
- assertVisible: ".*Buttercup.*"
- assertVisible: ".*BRED.*"

# Long press on the card to open the action sheet
- longPressOn: ".*Buttercup.*"
- waitForAnimationToEnd

# Tap "Mark pregnant" from the action sheet
- tapOn: "Mark pregnant"
- waitForAnimationToEnd

# Verify the badge changed to PREGNANT
- assertVisible: ".*PREGNANT.*"

# Verify the toast message appeared
- assertVisible: "Pregnancy confirmed for Buttercup."
