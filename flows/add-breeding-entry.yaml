appId: com.freshenapp.freshen
---
# Happy path: launch -> empty state -> tap + -> fill form -> save -> verify card appears
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Verify empty state
- assertVisible: "No breeding records yet. Tap + to add your first entry."

# Tap FAB to add a new entry
- tapOn: "+"
- waitForAnimationToEnd

# Verify Add breeding screen
- assertVisible: "Add breeding"

# Fill in animal name
- tapOn: "e.g. Daisy"
- inputText: "Daisy"

# Fill in sire name
- tapOn: "e.g. Buck (optional)"
- inputText: "Thunder"

# Pairing date defaults to today — no need to change

# Species defaults to Goat, gestation defaults to 150 — no need to change

# Scroll down to the Save button and tap it
- swipe:
    start: 50%, 40%
    end: 50%, 15%
- scrollUntilVisible:
    element: "Save"
    direction: DOWN
- tapOn: "Save"
- waitForAnimationToEnd

# Wait for the settled home screen — the count header exists only there
# (the typed name also matches the form input, so it can't be the wait target)
- extendedWaitUntil:
    visible: "1 active breeding."
    timeout: 10000

# Verify the card (sire renders as "× Thunder")
- assertVisible: ".*Daisy.*"
- assertVisible: ".*Thunder.*"
- assertVisible: ".*BRED.*"
