appId: com.freshenapp.freshen
---
# Log birth: add a record -> action sheet -> log birth -> verify status changes
- launchApp:
    clearState: true
- waitForAnimationToEnd

# First, add a breeding record
- tapOn: "+"
- waitForAnimationToEnd
- tapOn: "e.g. Daisy"
- inputText: "Clover"
- tapOn: "e.g. Buck (optional)"
- inputText: "Duke"
- hideKeyboard
- scrollUntilVisible:
    element: "Save"
    direction: DOWN
- tapOn: "Save"
- waitForAnimationToEnd

# Verify the card is visible
- assertVisible: "Clover"

# Long press to open the action sheet
- longPressOn: "Clover"
- waitForAnimationToEnd

# Tap "Log birth" from the action sheet
- tapOn: "Log birth"
- waitForAnimationToEnd

# Verify we are on the Log birth screen (title includes the animal name)
- assertVisible: "Log birth — Clover"

# Birth date defaults to today — no need to change

# Offspring count fields show placeholder "0"; their labels are not tappable
# inputs, so tap the first remaining "0" input each time: Doe (female) first
- tapOn:
    text: "0"
    index: 0
- inputText: "2"
- hideKeyboard

# After filling does, the first remaining "0" input is Buck (male)
- tapOn:
    text: "0"
    index: 0
- inputText: "1"
- hideKeyboard

# Tap the save button
- scrollUntilVisible:
    element: "Save birth record"
    direction: DOWN
- tapOn: "Save birth record"
- waitForAnimationToEnd

# Verify the status changed to BIRTH LOGGED on the home screen
- assertVisible: "BIRTH LOGGED"
- assertVisible: "Clover"
