appId: com.freshenapp.freshen
---
# Validation: submit empty form -> verify error messages appear
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Fresh install lands on the welcome screen — proceed without an account
- tapOn: "Continue without an account"
- waitForAnimationToEnd

# Tap FAB to add a new entry
- tapOn: "+"
- waitForAnimationToEnd

# Verify Add breeding screen
- assertVisible: "Add breeding"

# Do not fill in any fields — animal name is empty by default
# Pairing date is pre-filled with today's date, so only animal name will error

# Scroll to Save and tap without filling required fields
- swipe:
    start: 50%, 40%
    end: 50%, 15%
- scrollUntilVisible:
    element: "Save"
    direction: DOWN
- tapOn: "Save"

# Verify the animal name error message appears
- assertVisible: "Animal name is required."
